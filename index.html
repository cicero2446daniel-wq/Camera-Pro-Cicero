<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v11.0 - Controle Total</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 720px; border-radius: 15px; background: #111; margin: 10px 0; border: 2px solid #333; }
        .painel { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #c5a059; width: 95%; max-width: 450px; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        button { width: 100%; padding: 18px; margin: 8px 0; background: #c5a059; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: #000; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .btn-selfie { background: #333; color: #fff; border: 1px solid #c5a059; }
        .btn-acao { background: #28a745; color: white; margin-top: 15px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; font-size: 18px; margin-top: 10px; }
        #meu-id { font-size: 15px; color: #fff; font-weight: bold; background: #222; padding: 12px; border-radius: 8px; margin: 10px 0; word-break: break-all; border: 1px dashed #444; }
    </style>
</head>
<body>

    <div class="painel">
        <h2 style="margin:0 0 10px 0; letter-spacing: 2px;">CONTROLES DA CÂMERA</h2>
        
        <div style="font-size: 11px; color: #888; text-transform: uppercase;">ID Deste Aparelho:</div>
        <div id="meu-id">Gerando endereço...</div>
        
        <button onclick="iniciarCam('environment')">LIGAR CÂMERA TRASEIRA</button>
        <button onclick="iniciarCam('user')" class="btn-selfie">LIGAR CÂMERA SELFIE</button>
        
        <hr style="border:0; border-top: 1px solid #333; margin: 20px 0;">
        
        <input type="text" id="id-destino" placeholder="Cole o ID do outro aparelho">
        <button onclick="conectar()" class="btn-acao">CONECTAR / RECEBER SINAL</button>
    </div>

    <video id="videoDisplay" autoplay playsinline muted></video>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        const videoElement = document.getElementById('videoDisplay');

        peer.on('open', id => { document.getElementById('meu-id').innerText = id; });

        async function iniciarCam(modo) {
            // Se já tiver uma câmera aberta, desliga antes de trocar
            if (streamLocal) streamLocal.getTracks().forEach(t => t.stop());
            
            try {
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: modo, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoElement.srcObject = streamLocal;
            } catch (e) { alert("Erro ao abrir câmera: " + e.message); }
        }

        function conectar() {
            const idDestino = document.getElementById('id-destino').value.trim();
            if (!idDestino) return alert("Por favor, insira o ID!");
            
            // Faz a chamada enviando a câmera local (se estiver ligada)
            const call = peer.call(idDestino, streamLocal || new MediaStream());
            
            call.on('stream', remoteStream => {
                videoElement.srcObject = remoteStream;
                
                // LÓGICA DE DESATIVAR: Se você está no PC e recebeu a imagem do celular,
                // o código desliga a webcam do PC automaticamente para não retransmitir.
                if (streamLocal) {
                    streamLocal.getTracks().forEach(track => track.stop());
                    streamLocal = null;
                }
            });
        }

        // Atendimento automático (Receber sinal no PC)
        peer.on('call', call => {
            call.answer(streamLocal);
            call.on('stream', remoteStream => {
                videoElement.srcObject = remoteStream;
                
                // Desliga a câmera local caso receba um sinal externo
                if (streamLocal) {
                    streamLocal.getTracks().forEach(track => track.stop());
                    streamLocal = null;
                }
            });
        });
    </script>
</body>
</html>
