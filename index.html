<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro - OBS Link</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; background: #000; }
        .controles { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(22,22,22,0.9); padding: 15px; border-radius: 15px; border: 1px solid #c5a059; }
        button { width: 100%; padding: 15px; margin: 5px 0; background: #c5a059; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .id-label { font-size: 12px; color: #fff; margin-bottom: 10px; word-break: break-all; }
        #cam-obs { display: none; color: #c5a059; padding-top: 45vh; }
    </style>
</head>
<body>
    <video id="videoDisplay" autoplay playsinline muted></video>
    <div id="cam-obs">AGUARDANDO CONEXÃO DO CELULAR...</div>

    <div id="painel-celular" class="controles">
        <div id="meu-id" class="id-label">Conectando...</div>
        <button onclick="iniciar('environment')">LIGAR CÂMERA TRASEIRA</button>
        <button onclick="iniciar('user')" style="background:#333; color:#fff; border:1px solid #c5a059;">USAR SELFIE</button>
    </div>

    <script>
        const peer = new Peer();
        let streamAtiva = null;
        const videoElement = document.getElementById('videoDisplay');

        // DETECÇÃO AUTOMÁTICA DE OBS
        const isOBS = navigator.userAgent.includes("OBS") || window.innerWidth > 1000;

        if (isOBS) {
            document.getElementById('painel-celular').style.display = 'none';
            document.getElementById('cam-obs').style.display = 'block';
        }

        peer.on('open', id => {
            document.getElementById('meu-id').innerText = "ID DO CELULAR: " + id;
            if(isOBS) console.log("ID DO RECEPTOR:", id);
        });

        async function iniciar(modo) {
            if (streamAtiva) streamAtiva.getTracks().forEach(t => t.stop());
            streamAtiva = await navigator.mediaDevices.getUserMedia({ video: { facingMode: modo } });
            videoElement.srcObject = streamAtiva;
        }

        // RECEPTOR (OBS) - Ele fica ouvindo a chamada
        peer.on('call', call => {
            call.answer(); // Atende sem enviar vídeo de volta
            call.on('stream', remoteStream => {
                document.getElementById('cam-obs').style.display = 'none';
                videoElement.srcObject = remoteStream;
            });
        });

        // FUNÇÃO DE CONEXÃO (Para usar no Console ou via ID fixo se preferir)
        function conectarAoID(idRemoto) {
            const call = peer.call(idRemoto, new MediaStream());
            call.on('stream', remoteStream => {
                document.getElementById('cam-obs').style.display = 'none';
                videoElement.srcObject = remoteStream;
            });
        }
    </script>
</body>
</html>
