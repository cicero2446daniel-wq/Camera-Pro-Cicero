<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v18.0 - Visibilidade Total</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Container do Vídeo */
        .video-container { position: relative; width: 100%; max-width: 800px; height: 450px; background: #111; border-radius: 15px; border: 2px solid #333; overflow: hidden; margin: 10px 0; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #videoLocal { z-index: 2; }
        #videoRemoto { z-index: 1; }

        /* Painel de Controle */
        .painel { background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #c5a059; width: 95%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* TEXTO DO ID GIGANTE */
        #meu-id { 
            font-size: 24px; /* Tamanho muito maior */
            color: #fff; 
            font-weight: 900; 
            background: #222; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 10px 0; 
            border: 2px dashed #c5a059;
            word-break: break-all;
            letter-spacing: 1px;
        }

        /* CAMPO DE DIGITAÇÃO GIGANTE */
        input { 
            width: 100%; 
            padding: 20px; 
            border-radius: 12px; 
            border: 2px solid #444; 
            background: #000; 
            color: #28a745; /* Cor verde para destacar o que está sendo digitado */
            box-sizing: border-box; 
            text-align: center; 
            font-size: 22px; /* Fonte grande para conferência */
            font-weight: bold;
            margin-top: 15px;
        }

        button { width: 100%; padding: 18px; margin: 8px 0; background: #c5a059; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: #000; text-transform: uppercase; }
        .btn-selfie { background: #333; color: #fff; border: 1px solid #c5a059; }
        .btn-sucesso { background: #28a745; color: white; border: 2px solid #fff; font-size: 18px; }
        
        label { font-size: 14px; color: #888; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <div class="painel">
        <h2 style="margin:0 0 15px 0;">SISTEMA DE TRANSMISSÃO</h2>
        
        <label>ID PARA COPIAR:</label>
        <div id="meu-id">GERANDO CÓDIGO...</div>
        
        <button onclick="iniciarCam('environment')">LIGAR CÂMERA PRINCIPAL</button>
        <button onclick="iniciarCam('user')" class="btn-selfie">LIGAR CÂMERA SELFIE</button>
        
        <hr style="border:0; border-top: 1px solid #333; margin: 20px 0;">
        
        <label>DIGITE O ID DO OUTRO APARELHO:</label>
        <input type="text" id="id-destino" placeholder="0000-0000-0000...">
        
        <button onclick="conectar()" style="background:#444; color:#fff;">1. ESTABELECER CONEXÃO</button>
        <button onclick="liberarImagemCelular()" id="btnVerCelular" class="btn-sucesso" style="display:none;">2. MOSTRAR IMAGEM DO CELULAR</button>
    </div>

    <div class="video-container">
        <video id="videoLocal" autoplay playsinline muted></video>
        <video id="videoRemoto" autoplay playsinline></video>
    </div>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        const vLocal = document.getElementById('videoLocal');
        const vRemoto = document.getElementById('videoRemoto');
        const btnVer = document.getElementById('btnVerCelular');

        peer.on('open', id => { document.getElementById('meu-id').innerText = id; });

        async function iniciarCam(modo) {
            if (streamLocal) streamLocal.getTracks().forEach(t => t.stop());
            try {
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: modo, width: 1280, height: 720 },
                    audio: false
                });
                vLocal.srcObject = streamLocal;
            } catch (e) { alert("Erro: " + e.message); }
        }

        function conectar() {
            const idDestino = document.getElementById('id-destino').value.trim();
            if (!idDestino) return alert("Insira o ID!");
            
            const call = peer.call(idDestino, streamLocal || new MediaStream());
            call.on('stream', remoteStream => {
                vRemoto.srcObject = remoteStream;
                btnVer.style.display = "block";
            });
        }

        function liberarImagemCelular() {
            vLocal.style.zIndex = "1";
            vRemoto.style.zIndex = "2";
            if (streamLocal) {
                streamLocal.getVideoTracks().forEach(track => { track.enabled = false; });
            }
        }

        peer.on('call', call => {
            call.answer(streamLocal);
            call.on('stream', remoteStream => {
                vRemoto.srcObject = remoteStream;
                btnVer.style.display = "block";
            });
        });
    </script>
</body>
</html>
