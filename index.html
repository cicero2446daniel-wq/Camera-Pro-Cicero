<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v19.0 - Layout Gigante</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* PAINEL LARGO PARA PC */
        .painel { 
            background: #161616; 
            padding: 35px; 
            border-radius: 25px; 
            border: 2px solid #c5a059; 
            width: 98%; 
            max-width: 850px; /* Aumentei muito a largura máxima */
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.2);
        }
        
        /* ID COM FONTE GIGANTE */
        #meu-id { 
            font-size: 38px; /* Quase o dobro do anterior */
            color: #fff; 
            font-weight: bold; 
            background: #222; 
            padding: 25px; 
            border-radius: 15px; 
            margin: 15px 0; 
            border: 3px dashed #c5a059;
            word-break: break-all;
            font-family: monospace; /* Fonte fixa ajuda na leitura de códigos */
        }

        /* INPUT DE DIGITAÇÃO LARGO E GRANDE */
        input { 
            width: 100%; 
            padding: 25px; 
            border-radius: 15px; 
            border: 3px solid #444; 
            background: #000; 
            color: #28a745; 
            box-sizing: border-box; 
            text-align: center; 
            font-size: 32px; /* Fonte muito maior para conferência */
            font-weight: bold;
            margin-top: 20px;
        }

        button { width: 100%; padding: 22px; margin: 10px 0; background: #c5a059; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 20px; color: #000; text-transform: uppercase; }
        .btn-selfie { background: #333; color: #fff; border: 1px solid #c5a059; }
        .btn-sucesso { background: #28a745; color: white; border: 3px solid #fff; font-size: 24px; padding: 30px; }
        
        label { font-size: 18px; color: #aaa; font-weight: bold; display: block; margin-top: 10px; }

        .video-container { position: relative; width: 100%; max-width: 850px; height: 480px; background: #111; border-radius: 20px; border: 2px solid #333; overflow: hidden; margin-top: 20px; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #videoLocal { z-index: 2; }
        #videoRemoto { z-index: 1; }
    </style>
</head>
<body>

    <div class="painel">
        <h1 style="margin:0 0 20px 0; font-size: 32px;">CONTROLE DE TRANSMISSÃO</h1>
        
        <label>SEU CÓDIGO (COPIE ESTE):</label>
        <div id="meu-id">CARREGANDO...</div>
        
        <div style="display: flex; gap: 10px;">
            <button onclick="iniciarCam('environment')">CÂMERA TRASEIRA</button>
            <button onclick="iniciarCam('user')" class="btn-selfie">CÂMERA SELFIE</button>
        </div>
        
        <hr style="border:0; border-top: 2px solid #333; margin: 30px 0;">
        
        <label>DIGITE O CÓDIGO DO OUTRO APARELHO:</label>
        <input type="text" id="id-destino" placeholder="Cole o ID aqui">
        
        <button onclick="conectar()" style="background:#444; color:#fff; font-size: 22px;">1. CONECTAR APARELHOS</button>
        <button onclick="liberarImagemCelular()" id="btnVerCelular" class="btn-sucesso" style="display:none;">2. MOSTRAR IMAGEM DO CELULAR</button>
    </div>

    <div class="video-container">
        <video id="videoLocal" autoplay playsinline muted></video>
        <video id="videoRemoto" autoplay playsinline></video>
    </div>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        const vLocal = document.getElementById('videoLocal');
        const vRemoto = document.getElementById('videoRemoto');
        const btnVer = document.getElementById('btnVerCelular');

        peer.on('open', id => { document.getElementById('meu-id').innerText = id; });

        async function iniciarCam(modo) {
            if (streamLocal) streamLocal.getTracks().forEach(t => t.stop());
            try {
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: modo, width: 1280, height: 720 },
                    audio: false
                });
                vLocal.srcObject = streamLocal;
            } catch (e) { alert("Erro de Câmera: " + e.message); }
        }

        function conectar() {
            const idDestino = document.getElementById('id-destino').value.trim();
            if (!idDestino) return alert("Por favor, insira o ID!");
            
            const call = peer.call(idDestino, streamLocal || new MediaStream());
            call.on('stream', remoteStream => {
                vRemoto.srcObject = remoteStream;
                btnVer.style.display = "block";
            });
        }

        function liberarImagemCelular() {
            vLocal.style.zIndex = "1";
            vRemoto.style.zIndex = "2";
            if (streamLocal) {
                streamLocal.getVideoTracks().forEach(track => { track.enabled = false; });
            }
        }

        peer.on('call', call => {
            call.answer(streamLocal);
            call.on('stream', remoteStream => {
                vRemoto.srcObject = remoteStream;
                btnVer.style.display = "block";
            });
        });
    </script>
</body>
</html>
