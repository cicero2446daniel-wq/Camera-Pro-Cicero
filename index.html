<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v10.0 - Auto-Kill PC Cam</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 720px; border-radius: 15px; background: #111; margin: 10px 0; border: 2px solid #333; }
        .painel { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #c5a059; width: 95%; max-width: 450px; }
        button { width: 100%; padding: 18px; margin: 8px 0; background: #c5a059; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: #000; }
        .btn-conectar { background: #28a745; color: white; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; font-size: 18px; margin-top: 10px; }
        #meu-id { font-size: 16px; color: #fff; font-weight: bold; background: #222; padding: 12px; border-radius: 8px; margin: 10px 0; }
        .status { font-size: 12px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="painel">
        <h2 style="margin:0;">CONTROLE DE SINAL</h2>
        <p class="status">ID DESTE APARELHO:</p>
        <div id="meu-id">Carregando...</div>
        
        <button onclick="iniciarCamLocal()">1. ATIVAR CÂMERA LOCAL</button>
        
        <hr style="border:0; border-top: 1px solid #333; margin: 20px 0;">
        
        <input type="text" id="id-destino" placeholder="Digite o ID do outro aparelho">
        <button onclick="conectar()" class="btn-conectar">2. CONECTAR / PEDIR IMAGEM</button>
    </div>

    <video id="videoDisplay" autoplay playsinline muted></video>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        const videoElement = document.getElementById('videoDisplay');

        peer.on('open', id => { document.getElementById('meu-id').innerText = id; });

        // Abre a câmera do dispositivo (Celular ou PC)
        async function iniciarCamLocal() {
            try {
                if (streamLocal) streamLocal.getTracks().forEach(t => t.stop());
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoElement.srcObject = streamLocal;
            } catch (e) { alert("Erro ao abrir câmera: " + e.message); }
        }

        // Faz a chamada para o outro aparelho
        function conectar() {
            const idDestino = document.getElementById('id-destino').value.trim();
            if (!idDestino) return alert("Insira o ID!");
            
            const call = peer.call(idDestino, streamLocal || new MediaStream());
            
            call.on('stream', remoteStream => {
                // SUCESSO: Recebeu imagem do outro lado!
                videoElement.srcObject = remoteStream;
                
                // LÓGICA SOLICITADA: Se eu estou no PC e recebi a imagem do celular,
                // eu desligo a minha própria webcam para não retransmitir.
                if (streamLocal) {
                    streamLocal.getTracks().forEach(track => track.stop());
                    streamLocal = null; // Limpa a variável para o sistema saber que não há mais envio
                    console.log("Câmera local desativada. Exibindo apenas sinal remoto.");
                }
            });
        }

        // Atendimento automático
        peer.on('call', call => {
            call.answer(streamLocal);
            call.on('stream', remoteStream => {
                videoElement.srcObject = remoteStream;
                // Também desativa a câmera local ao receber sinal via atendimento
                if (streamLocal) {
                    streamLocal.getTracks().forEach(track => track.stop());
                    streamLocal = null;
                }
            });
        });
    </script>
</body>
</html>
