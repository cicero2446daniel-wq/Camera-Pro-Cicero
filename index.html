<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v12.0 - Final</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 720px; border-radius: 15px; background: #111; margin: 10px 0; border: 2px solid #333; }
        .painel { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #c5a059; width: 95%; max-width: 450px; }
        button { width: 100%; padding: 16px; margin: 5px 0; background: #c5a059; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; color: #000; }
        .btn-selfie { background: #333; color: #fff; border: 1px solid #c5a059; }
        .btn-acao { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; } /* Botão para desligar cam do PC */
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; font-size: 18px; }
        #meu-id { font-size: 14px; color: #fff; font-weight: bold; background: #222; padding: 10px; border-radius: 8px; margin: 10px 0; word-break: break-all; }
    </style>
</head>
<body>

    <div class="painel">
        <h2 style="margin:0 0 10px 0;">CONTROLE PROFISSIONAL</h2>
        <div id="meu-id">Conectando ao servidor...</div>
        
        <button onclick="iniciarCam('environment')">LIGAR CÂMERA TRASEIRA</button>
        <button onclick="iniciarCam('user')" class="btn-selfie">LIGAR CÂMERA SELFIE</button>
        
        <hr style="border:0; border-top: 1px solid #333; margin: 15px 0;">
        
        <input type="text" id="id-destino" placeholder="ID do outro aparelho">
        <button onclick="conectar()" class="btn-acao">RECEBER / PEDIR SINAL</button>
        
        <button onclick="matarWebcamPC()" class="btn-stop">DESLIGAR WEBCAM DESTE PC</button>
    </div>

    <video id="videoDisplay" autoplay playsinline muted></video>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        const videoElement = document.getElementById('videoDisplay');

        peer.on('open', id => { document.getElementById('meu-id').innerText = id; });

        async function iniciarCam(modo) {
            if (streamLocal) streamLocal.getTracks().forEach(t => t.stop());
            try {
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: modo, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoElement.srcObject = streamLocal;
            } catch (e) { alert("Erro: " + e.message); }
        }

        // Função exclusiva para o seu PC (Apaga a luz sem cair a rede)
        function matarWebcamPC() {
            if (streamLocal) {
                streamLocal.getVideoTracks().forEach(track => {
                    track.enabled = false; // Desativa a captura (apaga a luz)
                    track.stop(); // Tenta parar o hardware sem matar o objeto stream
                });
                console.log("Webcam do PC desativada.");
            }
        }

        function conectar() {
            const idDestino = document.getElementById('id-destino').value.trim();
            if (!idDestino) return alert("Insira o ID!");
            
            const call = peer.call(idDestino, streamLocal || new MediaStream());
            
            call.on('stream', remoteStream => {
                videoElement.srcObject = remoteStream;
                // No PC, após receber o sinal do celular, clicamos no botão vermelho
            });
        }

        peer.on('call', call => {
            call.answer(streamLocal);
            call.on('stream', remoteStream => {
                videoElement.srcObject = remoteStream;
            });
        });
    </script>
</body>
</html>
