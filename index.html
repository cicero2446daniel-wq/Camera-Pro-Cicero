<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v21.0 - Automação Total</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .painel { background: #111; padding: 40px; border-radius: 30px; border: 3px solid #c5a059; width: 95%; max-width: 1400px; margin: 10px auto; }
        #meu-id { font-size: 50px; color: #fff; font-weight: 900; background: #000; padding: 30px; border-radius: 20px; margin: 20px 0; border: 4px dashed #c5a059; word-break: break-all; font-family: monospace; }
        input { width: 90%; padding: 30px; border-radius: 20px; border: 4px solid #444; background: #000; color: #28a745; text-align: center; font-size: 40px; font-weight: bold; }
        button { padding: 25px; background: #c5a059; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 22px; color: #000; text-transform: uppercase; margin: 5px; }
        .video-container { position: relative; width: 95%; max-width: 1200px; height: 500px; background: #000; border-radius: 25px; border: 2px solid #333; overflow: hidden; margin: 20px auto; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #videoLocal { z-index: 2; }
        #videoRemoto { z-index: 1; }
    </style>
</head>
<body>
    <div class="painel">
        <h1 id="status-titulo">MODO AUTOMÁTICO</h1>
        <div id="meu-id">IDENTIFICANDO...</div>
        <input type="text" id="id-destino" placeholder="Aguardando comando...">
        <br>
        <button onclick="conectar()">CONECTAR MANUAL</button>
    </div>

    <div class="video-container">
        <video id="videoLocal" autoplay playsinline muted></video>
        <video id="videoRemoto" autoplay playsinline></video>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const modo = urlParams.get('modo'); // 'celular' ou 'pc'
        const idFixo = urlParams.get('id');  // O ID que você escolher no JSON

        // Se for celular, ele é o ID que o PC vai buscar. Se for PC, ele busca o celular.
        const meuId = (modo === 'celular') ? idFixo : (idFixo + "-receptor");
        const destinoId = (modo === 'celular') ? (idFixo + "-receptor") : idFixo;

        const peer = new Peer(meuId);
        let streamLocal = null;
        const vLocal = document.getElementById('videoLocal');
        const vRemoto = document.getElementById('videoRemoto');

        peer.on('open', id => {
            document.getElementById('meu-id').innerText = id;
            if (modo === 'celular') {
                document.getElementById('status-titulo').innerText = "MODO: CELULAR (TRANSMISSOR)";
                iniciarCam('environment'); // Já liga a câmera traseira no celular
            } else {
                document.getElementById('status-titulo').innerText = "MODO: SISTEMA (RECEPTOR)";
                document.getElementById('id-destino').value = destinoId;
                // No PC (StreamLite), ele tenta conectar no celular após 5 segundos
                setTimeout(conectar, 5000);
            }
        });

        async function iniciarCam(face) {
            try {
                streamLocal = await navigator.mediaDevices.getUserMedia({ video: { facingMode: face }, audio: false });
                vLocal.srcObject = streamLocal;
            } catch (e) { console.error(e); }
        }

        function conectar() {
            const dest = document.getElementById('id-destino').value;
            const call = peer.call(dest, streamLocal || new MediaStream());
            call.on('stream', remote => { vRemoto.srcObject = remote; vLocal.style.zIndex = "1"; vRemoto.style.zIndex = "2"; });
        }

        peer.on('call', call => {
            call.answer(streamLocal);
            call.on('stream', remote => { vRemoto.srcObject = remote; vLocal.style.zIndex = "1"; vRemoto.style.zIndex = "2"; });
        });
    </script>
</body>
</html>
