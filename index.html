<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v16.0 - Dual Layer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .video-container { position: relative; width: 100%; max-width: 720px; height: 405px; background: #111; border-radius: 15px; border: 2px solid #333; overflow: hidden; margin: 10px 0; }
        
        /* Camadas de vídeo */
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #videoLocal { z-index: 2; } /* Sua câmera fica por cima no início */
        #videoRemoto { z-index: 1; display: none; } /* Celular fica escondido atrás */

        .painel { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #c5a059; width: 95%; max-width: 450px; }
        button { width: 100%; padding: 15px; margin: 5px 0; background: #c5a059; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; color: #000; }
        .btn-selfie { background: #333; color: #fff; border: 1px solid #c5a059; }
        .btn-switch { background: #28a745; color: white; border: 2px solid #fff; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; font-size: 16px; }
        #meu-id { font-size: 14px; color: #fff; font-weight: bold; background: #222; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px dashed #444; }
    </style>
</head>
<body>

    <div class="painel">
        <h2 style="margin:0 0 10px 0;">CONTROLE DE CAMADAS</h2>
        <div id="meu-id">Conectando...</div>
        
        <button onclick="iniciarCam('environment')">LIGAR CÂMERA TRASEIRA</button>
        <button onclick="iniciarCam('user')" class="btn-selfie">LIGAR CÂMERA SELFIE</button>
        
        <hr style="border:0; border-top: 1px solid #333; margin: 15px 0;">
        
        <input type="text" id="id-destino" placeholder="ID do outro aparelho">
        <button onclick="conectar()">CONECTAR / PEDIR SINAL</button>
        
        <button onclick="mostrarCelular()" class="btn-switch" id="btnTroca" style="display:none;">MOSTRAR IMAGEM DO CELULAR</button>
    </div>

    <div class="video-container">
        <video id="videoLocal" autoplay playsinline muted></video>
        <video id="videoRemoto" autoplay playsinline></video>
    </div>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        const vLocal = document.getElementById('videoLocal');
        const vRemoto = document.getElementById('videoRemoto');

        peer.on('open', id => { document.getElementById('meu-id').innerText = id; });

        async function iniciarCam(modo) {
            if (streamLocal) streamLocal.getTracks().forEach(t => t.stop());
            try {
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: modo, width: 1280, height: 720 },
                    audio: false
                });
                vLocal.srcObject = streamLocal;
                vLocal.style.display = "block";
            } catch (e) { alert("Erro: " + e.message); }
        }

        function conectar() {
            const idDestino = document.getElementById('id-destino').value.trim();
            if (!idDestino) return alert("Insira o ID!");
            
            const call = peer.call(idDestino, streamLocal || new MediaStream());
            
            call.on('stream', remoteStream => {
                vRemoto.srcObject = remoteStream;
                vRemoto.style.display = "block";
                document.getElementById('btnTroca').style.display = "block";
                alert("Sinal do celular recebido! Clique no botão verde para ver.");
            });
        }

        // Troca visual sem desligar nada
        function mostrarCelular() {
            vLocal.style.zIndex = "1";
            vRemoto.style.zIndex = "2";
            // Agora que o celular está na frente, "escondemos" a local
            // para tentar apagar a luz sem matar o processo
            if (streamLocal) {
                streamLocal.getVideoTracks()[0].enabled = false;
            }
            alert("Exibindo sinal remoto. A luz da webcam do PC deve apagar agora.");
        }

        peer.on('call', call => {
            call.answer(streamLocal);
            call.on('stream', remoteStream => {
                vRemoto.srcObject = remoteStream;
                vRemoto.style.display = "block";
                document.getElementById('btnTroca').style.display = "block";
            });
        });
    </script>
</body>
</html>
