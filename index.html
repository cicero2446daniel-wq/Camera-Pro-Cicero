<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v4.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 15px; }
        video { width: 100%; max-width: 800px; border: 2px solid #c5a059; border-radius: 15px; background: #111; }
        .painel { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-top: 15px; }
        button { padding: 16px; background: #c5a059; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 15px; }
        .btn-selfie { background: #333; color: #fff; border: 1px solid #c5a059; }
        input { padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 15px; text-align: center; }
        .status { font-size: 13px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>TRANSMISSOR CÂMERA PRO</h2>
    <video id="videoDisplay" autoplay playsinline muted></video>

    <div class="painel">
        <div id="meu-id" class="status">Conectando ao sistema...</div>
        
        <button onclick="iniciarCam('environment')">1. ATIVAR CÂMERA TRASEIRA (CELULAR)</button>
        <button onclick="iniciarCam('user')" class="btn-selfie">1. ATIVAR CÂMERA SELFIE (CELULAR)</button>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <input type="text" id="id-receptor" placeholder="Cole o ID aqui">
        <button onclick="conectar()" style="background: #28a745; color: #fff;">2. INICIAR TRANSMISSÃO PARA O PC</button>
    </div>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        const videoElement = document.getElementById('videoDisplay');

        peer.on('open', id => {
            document.getElementById('meu-id').innerHTML = `ID DESTE APARELHO: <b style="color:#fff;">${id}</b>`;
        });

        async function iniciarCam(modo) {
            // Se for o PC (detectado pela largura da tela), ignoramos o comando de ligar câmera local
            if (window.innerWidth > 900) {
                alert("No computador, use apenas o campo de ID para receber a imagem do celular.");
                return;
            }

            if (streamLocal) streamLocal.getTracks().forEach(t => t.stop());

            try {
                // Removemos o zoom (lente de aumento) usando configurações padrão de proporção
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: modo, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoElement.srcObject = streamLocal;
            } catch (e) {
                alert("Erro ao acessar câmera: " + e.message);
            }
        }

        function conectar() {
            const idDestino = document.getElementById('id-receptor').value.trim();
            if (!idDestino) return alert("Insira o ID de destino!");

            // No PC, clicamos aqui para "puxar" a imagem. No celular, para "enviar".
            const call = peer.call(idDestino, streamLocal || new MediaStream());
            
            call.on('stream', remoteStream => {
                videoElement.srcObject = remoteStream;
            });
        }

        // Atendimento automático: Fundamental para o OBS e PC
        peer.on('call', call => {
            call.answer(streamLocal); 
            call.on('stream', remoteStream => {
                videoElement.srcObject = remoteStream;
            });
        });
    </script>
</body>
</html>
