<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro - Link Direto</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        video { width: 100%; max-width: 640px; border-radius: 15px; background: #111; margin-top: 10px; }
        .painel { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-top: 10px; }
        button { width: 100%; padding: 16px; margin: 8px 0; background: #c5a059; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-selfie { background: #333; color: #fff; border: 1px solid #c5a059; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; margin-bottom: 10px; text-align: center; font-size: 16px; }
        .id-display { font-size: 14px; color: #888; margin-bottom: 15px; word-break: break-all; }
        h2 { font-size: 18px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="interface-pc" style="display:none;">
        <h2>RECEPTOR (OBS/PC)</h2>
        <div class="painel">
            <p>ID PARA DIGITAR NO CELULAR:</p>
            <div id="meu-id-pc" style="font-size: 22px; color: #fff; font-weight: bold; padding: 10px; background: #222; border-radius: 10px;">Carregando ID...</div>
            <p style="font-size: 12px;">(O sinal aparecerá aqui automaticamente)</p>
        </div>
    </div>

    <div id="interface-celular" style="display:none;">
        <h2>TRANSMISSOR (CELULAR)</h2>
        <video id="preview" autoplay playsinline muted></video>
        <div class="painel">
            <button onclick="iniciarCam('environment')">LIGAR CÂMERA TRASEIRA</button>
            <button onclick="iniciarCam('user')" class="btn-selfie">LIGAR CÂMERA SELFIE</button>
            <hr style="border:0; border-top: 1px solid #333; margin: 15px 0;">
            <input type="text" id="id-receptor" placeholder="Cole o ID do OBS aqui">
            <button onclick="transmitir()" style="background: #28a745; color: white;">CONECTAR AO OBS</button>
        </div>
    </div>

    <video id="videoFinal" autoplay playsinline style="display:none;"></video>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        
        // Separação manual por tamanho de tela
        if (window.innerWidth > 900) {
            document.getElementById('interface-pc').style.display = 'block';
            document.getElementById('videoFinal').style.display = 'block';
        } else {
            document.getElementById('interface-celular').style.display = 'block';
        }

        peer.on('open', id => {
            if (document.getElementById('meu-id-pc')) {
                document.getElementById('meu-id-pc').innerText = id;
            }
        });

        async function iniciarCam(modo) {
            if (streamLocal) streamLocal.getTracks().forEach(t => t.stop());
            try {
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: modo, width: 1280, height: 720 },
                    audio: false
                });
                document.getElementById('preview').srcObject = streamLocal;
            } catch (e) { alert("Erro na câmera: " + e); }
        }

        function transmitir() {
            const idDestino = document.getElementById('id-receptor').value.trim();
            if (!idDestino || !streamLocal) return alert("Ligue a câmera e cole o ID do OBS!");
            
            peer.call(idDestino, streamLocal);
            alert("Transmitindo para o OBS...");
        }

        // O PC/OBS apenas atende
        peer.on('call', call => {
            call.answer();
            call.on('stream', remoteStream => {
                document.getElementById('interface-pc').style.display = 'none';
                const v = document.getElementById('videoFinal');
                v.srcObject = remoteStream;
                v.play();
            });
        });
    </script>
</body>
</html>
