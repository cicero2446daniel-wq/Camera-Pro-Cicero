<script>
    const peer = new Peer();
    let streamLocal = null;
    let callAtiva = null; // Item novo: para controlar a chamada atual
    
    const vLocal = document.getElementById('videoLocal');
    const vRemoto = document.getElementById('videoRemoto');
    const btnVer = document.getElementById('btnVerCelular');
    const displayId = document.getElementById('meu-id');

    // 1. GERENCIAMENTO DE ID E STATUS
    peer.on('open', id => { 
        displayId.innerText = id; 
        console.log("Sistema Pronto. Seu ID:", id);
    });

    peer.on('error', err => {
        console.error("Erro no PeerJS:", err.type);
        if(err.type === 'peer-unavailable') alert("Código de destino não encontrado!");
    });

    // 2. INICIALIZAÇÃO DE CÂMERA COM LIMPEZA DE MEMÓRIA
    async function iniciarCam(modo) {
        // Limpa a câmera anterior antes de abrir a nova (Economiza bateria/processamento)
        if (streamLocal) {
            streamLocal.getTracks().forEach(t => t.stop());
        }
        
        try {
            streamLocal = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: modo, 
                    width: { ideal: 1280 }, 
                    height: { ideal: 720 },
                    frameRate: { ideal: 30 }
                },
                audio: false
            });
            vLocal.srcObject = streamLocal;
            
            // Se já houver uma chamada ativa, substitui o vídeo enviado
            if (callAtiva && callAtiva.peerConnection) {
                const videoTrack = streamLocal.getVideoTracks()[0];
                const sender = callAtiva.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);
            }
        } catch (e) { 
            alert("Não foi possível acessar a câmera: " + e.message); 
        }
    }

    // 3. FUNÇÃO DE CONEXÃO COMPLETA (Sincronizar)
    function conectar() {
        const idDestino = document.getElementById('id-destino').value.trim();
        if (!idDestino) return alert("Por favor, cole o código do celular!");

        // Garante que enviamos algo, mesmo que a câmera local não tenha sido ligada
        const streamParaEnviar = streamLocal || new MediaStream();
        
        callAtiva = peer.call(idDestino, streamParaEnviar);
        configurarChamada(callAtiva);
    }

    // 4. RESPOSTA AUTOMÁTICA
    peer.on('call', call => {
        callAtiva = call;
        call.answer(streamLocal || new MediaStream());
        configurarChamada(call);
    });

    // 5. CONFIGURAÇÃO DOS EVENTOS DA CHAMADA (O que faltava)
    function configurarChamada(call) {
        call.on('stream', remoteStream => {
            console.log("Sinal do celular recebido com sucesso!");
            vRemoto.srcObject = remoteStream;
            btnVer.style.display = "block"; 
            
            // Feedback visual no painel
            document.querySelector('h1').innerText = "CONECTADO";
            document.querySelector('h1').style.color = "#28a745";
        });

        call.on('close', () => {
            alert("A conexão foi encerrada.");
            btnVer.style.display = "none";
            document.querySelector('h1').innerText = "PAINEL DE CONEXÃO";
            document.querySelector('h1').style.color = "#c5a059";
        });
    }

    // 6. LIBERAR IMAGEM (Ajuste fino de Z-Index)
    function liberarImagemCelular() {
        // Traz o vídeo remoto para a frente
        vLocal.style.zIndex = "1";
        vRemoto.style.zIndex = "2";
        
        // Desativa o vídeo local para economizar banda, mas mantém a conexão
        if (streamLocal) {
            streamLocal.getVideoTracks().forEach(track => { track.enabled = false; });
        }
        
        btnVer.innerText = "✔ TRANSMITINDO CELULAR";
        btnVer.style.background = "#007bff";
    }
</script>
