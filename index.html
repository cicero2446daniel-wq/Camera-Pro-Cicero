<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v1.5 - Estável</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        video { width: 100%; max-width: 640px; border: 2px solid #c5a059; border-radius: 10px; background: #111; }
        .painel { background: #161616; padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #333; }
        button { padding: 15px; background: #c5a059; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; width: 80%; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #c5a059; background: #000; color: #fff; width: 80%; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>TRANSMISSOR CÂMERA PRO</h2>
    <video id="videoDisplay" autoplay playsinline muted></video>

    <div class="painel">
        <p id="meu-id">Conectando ao servidor...</p>
        
        <button onclick="ligarCamera()">1. ATIVAR CÂMERA (CELULAR)</button>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <input type="text" id="id-destino" placeholder="Cole o ID do celular aqui">
        <button onclick="conectar()">2. CONECTAR NO PC</button>
    </div>

    <script>
        const peer = new Peer(); 
        let streamLocal;

        peer.on('open', id => {
            document.getElementById('meu-id').innerHTML = `ID DESTE APARELHO:<br><b style="font-size: 20px; color: #fff;">${id}</b>`;
        });

        async function ligarCamera() {
            try {
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 },
                    audio: false
                });
                document.getElementById('videoDisplay').srcObject = streamLocal;
            } catch (err) {
                alert("Erro ao abrir câmera. Verifique as permissões do navegador.");
            }
        }

        function conectar() {
            const idRemoto = document.getElementById('id-destino').value.trim();
            if(!idRemoto) return alert("Insira o ID!");

            const call = peer.call(idRemoto, streamLocal || new MediaStream());
            
            call.on('stream', remoteStream => {
                document.getElementById('videoDisplay').srcObject = remoteStream;
            });
        }

        peer.on('call', call => {
            call.answer(streamLocal);
            call.on('stream', remoteStream => {
                document.getElementById('videoDisplay').srcObject = remoteStream;
            });
        });
    </script>
</body>
</html>
