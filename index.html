<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v5.0 - Final</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        video { width: 100%; max-width: 850px; border-radius: 15px; background: #111; margin-top: 5px; }
        .painel { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-top: 10px; }
        button { width: 100%; padding: 18px; margin: 8px 0; background: #c5a059; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-selfie { background: #333; color: #fff; border: 1px solid #c5a059; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; margin-bottom: 10px; text-align: center; font-size: 18px; }
        .info { font-size: 14px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2 id="status-title">MODO TRANSMISSOR</h2>
    <video id="videoDisplay" autoplay playsinline muted></video>

    <div class="painel">
        <p class="info">ID DO APARELHO:</p>
        <div id="meu-id" style="font-size: 20px; color: #fff; font-weight: bold; margin-bottom: 15px;">Carregando...</div>
        
        <div id="controles-camera">
            <button onclick="iniciarCam('environment')">1. ATIVAR CÂMERA TRASEIRA</button>
            <button onclick="iniciarCam('user')" class="btn-selfie">1. ATIVAR CÂMERA SELFIE</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <input type="text" id="id-destino" placeholder="Digite o ID do Receptor aqui">
        <button onclick="conectar()" style="background: #28a745; color: white;">2. ENVIAR SINAL PARA O RECEPTOR</button>
    </div>

    <script>
        const peer = new Peer();
        let localStream = null;
        const videoElement = document.getElementById('videoDisplay');
        const isPC = window.innerWidth > 900;

        if (isPC) {
            document.getElementById('status-title').innerText = "RECEPTOR (PC/OBS)";
            document.getElementById('controles-camera').style.display = 'none';
        }

        peer.on('open', id => {
            document.getElementById('meu-id').innerText = id;
        });

        async function iniciarCam(modo) {
            if (isPC) return; // Bloqueia ativação da webcam no notebook Acer
            
            if (localStream) localStream.getTracks().forEach(t => t.stop());

            try {
                // Configuração para evitar o zoom (proporção 16:9 forçada)
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: modo,
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        aspectRatio: 1.777777778
                    },
                    audio: false
                });
                videoElement.srcObject = localStream;
            } catch (e) { alert("Erro na câmera: " + e); }
        }

        function conectar() {
            const idRemoto = document.getElementById('id-destino').value.trim();
            if (!idRemoto) return alert("Insira o ID!");
            
            // Liga para o receptor enviando o vídeo (ou sinal vazio se for o PC)
            peer.call(idRemoto, localStream || new MediaStream());
        }

        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', remoteStream => {
                videoElement.srcObject = remoteStream;
                videoElement.play();
            });
        });
    </script>
</body>
</html>
