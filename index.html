<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Câmera Pro v9.0 - Estável</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-width: 720px; border-radius: 15px; background: #111; margin: 10px 0; border: 2px solid #333; }
        .painel { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #c5a059; width: 95%; max-width: 450px; }
        button { width: 100%; padding: 18px; margin: 8px 0; background: #c5a059; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; color: #000; }
        .btn-selfie { background: #333; color: #fff; border: 1px solid #c5a059; }
        .btn-enviar { background: #28a745; color: white; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; text-align: center; font-size: 18px; margin-top: 10px; }
        #meu-id { font-size: 16px; color: #fff; font-weight: bold; background: #222; padding: 12px; border-radius: 8px; margin: 10px 0; word-break: break-all; }
    </style>
</head>
<body>

    <div class="painel">
        <h2>CÂMERA PRO</h2>
        <div style="font-size: 12px; color: #888;">ID DESTE APARELHO:</div>
        <div id="meu-id">Conectando...</div>
        
        <button onclick="iniciarCam('environment')">1. LIGAR CÂMERA (CELULAR)</button>
        
        <hr style="border:0; border-top: 1px solid #333; margin: 20px 0;">
        
        <input type="text" id="id-destino" placeholder="Cole o ID do PC aqui">
        <button onclick="enviarSinal()" class="btn-enviar">2. ENVIAR PARA O PC</button>
        
        <p style="font-size: 11px; color: #666; margin-top: 10px;">No PC: Apenas abra a página e espere o sinal.</p>
    </div>

    <video id="videoDisplay" autoplay playsinline muted></video>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        const videoElement = document.getElementById('videoDisplay');

        peer.on('open', id => { document.getElementById('meu-id').innerText = id; });

        // FUNÇÃO PARA O CELULAR: Abre a câmera local
        async function iniciarCam(modo) {
            if (streamLocal) streamLocal.getTracks().forEach(t => t.stop());
            try {
                streamLocal = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: modo, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoElement.srcObject = streamLocal;
            } catch (e) { alert("Erro: " + e.message); }
        }

        // FUNÇÃO PARA O CELULAR: Envia o sinal para o PC
        function enviarSinal() {
            const idPC = document.getElementById('id-destino').value.trim();
            if (!idPC) return alert("Insira o ID do PC!");
            if (!streamLocal) return alert("Ligue a câmera do celular primeiro!");
            
            // Envia o vídeo do celular para o PC
            peer.call(idPC, streamLocal);
        }

        // FUNÇÃO PARA O PC: Recebe o sinal automaticamente
        peer.on('call', call => {
            // O PC responde sem enviar vídeo nenhum (null)
            call.answer(null); 
            call.on('stream', remoteStream => {
                videoElement.srcObject = remoteStream;
                videoElement.play();
            });
        });
    </script>
</body>
</html>
