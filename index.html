<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Transmissor Câmera Pro v1.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #c5a059; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        video { width: 100%; max-width: 720px; border: 2px solid #c5a059; border-radius: 10px; background: #111; }
        .painel { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-top: 20px; }
        button { padding: 15px 30px; background: #c5a059; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #c5a059; background: #000; color: #fff; text-align: center; }
    </style>
</head>
<body>
    <h2><i class="fas fa-video"></i> TRANSMISSOR CÂMERA PRO</h2>
    <video id="videoDisplay" autoplay playsinline muted></video>

    <div class="painel">
        <p id="meu-id">Gerando seu ID de conexão...</p>
        
        <div id="controles-transmissor">
            <button onclick="iniciarComoTransmissor()">1. ATIVAR CÂMERA NO CELULAR</button>
        </div>

        <div id="controles-receptor" style="margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;">
            <p>NO PC: Digite o ID que aparece no celular abaixo:</p>
            <input type="text" id="id-destino" placeholder="Digite o ID do celular">
            <button onclick="conectarComoReceptor()">2. RECEBER SINAL NO PC</button>
        </div>
    </div>

    <script>
        const peer = new Peer(); 
        let localStream;

        peer.on('open', id => {
            document.getElementById('meu-id').innerHTML = `SEU ID: <b style="font-size: 22px; color: #fff;">${id}</b>`;
        });

        async function iniciarComoTransmissor() {
            try {
                // Configuração otimizada para ser leve no seu Acer com AMD
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720, facingMode: "environment" },
                    audio: false
                });
                document.getElementById('videoDisplay').srcObject = localStream;
                console.log("Câmera do celular pronta.");
            } catch (err) {
                alert("Erro na câmera: " + err);
            }
        }

        // Função do PC: Agora ela tenta "chamar" o celular com mais insistência
        function conectarComoReceptor() {
            const idDestino = document.getElementById('id-destino').value.trim();
            if(!idDestino) return alert("Digite o ID!");

            console.log("Iniciando chamada para: " + idDestino);
            
            // Forçamos uma conexão de vídeo mesmo que o PC não tenha câmera
            const call = peer.call(idDestino, new MediaStream());

            call.on('stream', remoteStream => {
                console.log("Sinal recebido com sucesso!");
                const video = document.getElementById('videoDisplay');
                video.srcObject = remoteStream;
                video.onloadedmetadata = () => video.play();
            });

            // Se em 5 segundos não conectar, avisamos
            setTimeout(() => {
                const video = document.getElementById('videoDisplay');
                if(!video.srcObject) {
                    alert("O celular não respondeu. Certifique-se que a imagem aparece NA TELA DO CELULAR antes de tentar o PC.");
                }
            }, 5000);
        }

        // O CELULAR agora "escuta" e entrega o vídeo automaticamente
        peer.on('call', call => {
            console.log("Recebendo chamada do PC...");
            call.answer(localStream); // Entrega o vídeo do celular
            call.on('stream', remoteStream => {
                document.getElementById('videoDisplay').srcObject = remoteStream;
            });
        });

        // Garante que o celular atenda o PC automaticamente
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', remoteStream => {
                document.getElementById('videoDisplay').srcObject = remoteStream;
            });
        });
    </script>
</body>
</html>
